<!DOCTYPE html>
<html lang="es">
<head>
    {% load static crispy_forms_tags %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novasalud | Profesionales</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</head>
<body>

    <header class="hero">
        <div class="container">
            <h1>Novasalud</h1>
            <p>Cuidamos de ti en casa con atención profesional, humana y oportuna.</p>
            <a class="btn-servicios" href="/servicios/">Ver servicios</a>
        </div>
    </header>

    <main>
        <form action="{% url 'crear_profesional' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ formulario|crispy }}
            <button type="submit" class="btn btn-primary">Crear Profesional</button>
        </form>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Novasalud - Salud a domicilio con confianza.</p>
        </div>
    </footer>

</body>
</html>
